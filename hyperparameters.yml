# Base configuration (medium values)

cartpole_base:
  learning_rate_a: 0.001
  discount_factor_g: 0.99
  network_sync_rate: 100
  replay_memory_size: 10000
  mini_batch_size: 64
  epsilon_init: 1.0
  epsilon_decay: 0.995         
  epsilon_decay_steps: 200000  
  epsilon_min: 0.01
  stop_on_reward: 500          
  fc1_nodes: 64
  train_frequency: 4
  env_make_params: {}


